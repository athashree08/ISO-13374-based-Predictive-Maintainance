version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rulvision-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./backend/saved_models:/app/saved_models
    environment:
      - DATABASE_URL=sqlite:///./data/predictive_maintenance.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rulvision-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

networks:
  default:
    name: rulvision-network
